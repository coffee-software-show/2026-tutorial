spring.application.name=data-jdbc
#
spring.datasource.url=jdbc:postgresql://localhost/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
#
spring.flyway.baseline-on-migrate=true
#
jdbc.includes=query
jdbc.datasource-proxy.slow-query.enable-logging=true
#
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
#
server.shutdown=immediate
#
#logging.level.org.springframework.jdbc=trace
#logging.level.org.springframework.data.jdbc=trace
#logging.level.org.springframework.data.jdbc.repository.query=DEBUG
